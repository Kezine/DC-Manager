# CI de QUALITÉ : typecheck (front + serveur) et tests unitaires sur chaque push / pull request.
# Sans ce workflow, les 600+ assertions de Tests/modules/run.js ne protègent que celui qui pense à
# les lancer localement — Pages/Release ne font que builder.
name: Tests — typecheck + tests unitaires

on:
  push:
    branches: ["**"]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
      - run: npm ci
      # Typecheck FRONT (src/ + shared/, résolution bundler)
      - run: npx tsc --noEmit
      # Tests unitaires (compile dist-test/ puis exécute le harnais Node)
      - run: npm run test
      # Typecheck SERVEUR (NodeNext ; dépendances propres à src-server/)
      - name: Typecheck serveur
        working-directory: src-server
        run: |
          npm ci
          npx tsc --noEmit
