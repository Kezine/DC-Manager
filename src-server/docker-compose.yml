# DC Manager — build du client + serveur, en une commande :
#   cd src-server && docker compose up --build
# Puis ouvrir http://localhost:3000 (mode API, utilisateur dev factice).
services:
  dc-manager:
    build:
      context: ..                       # racine DcManager/ (le Dockerfile copie client + serveur)
      dockerfile: src-server/Dockerfile
    image: dc-manager
    ports:
      - "3000:3000"
    environment:
      PORT: "3000"
      API_BASE: /api
      LOG_LEVEL: info                    # error | warn | info | debug | trace
      # --- Auth ---
      # Pour un déploiement réel, préférez la Basic Auth (BASIC_AUTH ci-dessous) : le SSO est spécifique
      # à un besoin personnel et peu pertinent pour la plupart des usages (cf. RUN.md § Authentification).
      # MODE DEV par défaut (utilisateur factice SUPER_ADMIN) pour tester hors réseau SSO :
      SSO_URL: ""
      DEV_USER: dev
      # DEV : pour exiger un mot de passe (Basic Auth navigateur) au lieu de l'accès libre, décommenter :
      # BASIC_AUTH: "dev:secret"
      # Pour un VRAI SSO externe : commenter les 2 lignes ci-dessus et décommenter (adapter URL + cookie) :
      # SSO_URL: https://sso.example.com/validate
      # COOKIE_NAME: SsoJWT
    volumes:
      - dc-manager-data:/data            # persistance des documents (un .db par document)
    restart: unless-stopped

  # OUTIL de maintenance — client SQLite à la demande, pour inspecter/réparer une base à la main
  # (ex. purger des certificats d'un coffre dont la phrase maître est perdue).
  #
  # `profiles` le rend INERTE : `docker compose up` l'IGNORE totalement. L'image de production
  # reste donc vierge de tout éditeur de base — l'outil n'existe pas dans le conteneur qui sert
  # le port 3000. Il monte simplement le MÊME volume nommé, ce qui suffit à atteindre les fichiers.
  #
  #   docker compose stop dc-manager            # ⚠️ INDISPENSABLE — voir ci-dessous
  #   docker compose run --rm sqlite            # cibler le service active son profil tout seul
  #   docker compose start dc-manager
  #
  # ⚠️ WAL : le serveur ouvre les bases en WAL avec busy_timeout. Écrire pendant qu'il tourne =
  # deux écrivains concurrents → au mieux un timeout, au pire un état corrompu (le serveur garde
  # en mémoire des données qu'on vient d'effacer sous lui). TOUJOURS l'arrêter d'abord.
  #
  # Bases : /data/documents/certs.db (PKI) · registry.db (documents) · notify.db · vm-providers.db
  sqlite:
    profiles: ["tools"]
    image: alpine:3.20                   # `apk add` à chaque run : lent mais aucune image tierce dans la chaîne
    volumes:
      - dc-manager-data:/data
    working_dir: /data/documents
    entrypoint: ["/bin/sh", "-lc"]
    command: ["apk add --no-cache sqlite >/dev/null 2>&1 && exec sqlite3 certs.db"]

volumes:
  dc-manager-data:
