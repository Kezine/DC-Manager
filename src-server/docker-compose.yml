# NetMap — build du client + serveur, en une commande :
#   cd src-server && docker compose up --build
# Puis ouvrir http://localhost:3000 (mode API, utilisateur dev factice).
services:
  netmap:
    build:
      context: ..                       # racine NetMap/ (le Dockerfile copie client + serveur)
      dockerfile: src-server/Dockerfile
    image: netmap
    ports:
      - "3000:3000"
    environment:
      PORT: "3000"
      API_BASE: /api
      LOG_LEVEL: info                    # error | warn | info | debug | trace
      # --- Auth ---
      # MODE DEV par défaut (utilisateur factice SUPER_ADMIN) pour tester hors réseau SSO :
      SSO_URL: ""
      DEV_USER: dev
      # DEV : pour exiger un mot de passe (Basic Auth navigateur) au lieu de l'accès libre, décommenter :
      # BASIC_AUTH: "dev:secret"
      # DEV : pour tester l'écran d'accès refusé du client → NONE (pas les droits) ou ANON (non connecté) :
      # DEV_RIGHT: NONE
      # Pour le VRAI SSO (SSO externe) : commenter les 2 lignes ci-dessus et décommenter :
      # SSO_URL: https://sso.example.com/validate
      # COOKIE_NAME: SsoJWT
    volumes:
      - netmap-data:/data                # persistance des documents (un .db par document)
    restart: unless-stopped

volumes:
  netmap-data:
